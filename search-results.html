    keep it in here (and provide the functionality as &lt;tt class=&quot;inline-code&quot;&gt;pure&lt;/tt&gt; and &lt;tt class=&quot;inline-code&quot;&gt;@safe&lt;/tt&gt;).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.applyTags.html</link></decl><decl id="57" type="struct"><name>IRCParser</name><desc>&lt;div&gt;&lt;p&gt;Parser that takes raw IRC strings and produces &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;s based on them.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.html</link><decl id="58" type="variable"><name>client</name><desc>&lt;div&gt;&lt;p&gt;The current &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;dialect.defs.IRCClient&lt;/a&gt; with all the context needed for parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.client.html</link></decl><decl id="59" type="variable"><name>server</name><desc>&lt;div&gt;&lt;p&gt;The current &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;dialect.defs.IRCServer&lt;/a&gt; with all the context needed for parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.server.html</link></decl><decl id="60" type="variable"><name>typenums</name><desc>&lt;div&gt;&lt;p&gt;An &lt;tt class=&quot;inline-code&quot;&gt;dialect.defs.IRCEvent.Type[1024]&lt;/tt&gt; reverse lookup table for fast numeric lookups.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.typenums.html</link></decl><decl id="61" type="variable"><name>postprocessors</name><desc>&lt;div&gt;&lt;p&gt;Array of active &lt;a class=&quot;xref&quot; href=&quot;dialect.common.Postprocessor.html&quot;&gt;dialect.common.Postprocessor&lt;/a&gt;s, to be iterated through
        and processed after parsing is complete.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.postprocessors.html</link></decl><decl id="62" type="function"><name>toIRCEvent</name><desc>&lt;div&gt;&lt;p&gt;Parses an IRC string into an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.toIRCEvent.html</link></decl><decl id="63" type="constructor"><name>this</name><desc>&lt;div&gt;&lt;p&gt;Create a new &lt;a class=&quot;xref&quot; href=&quot;dialect.parsing.IRCParser.html&quot;&gt;IRCParser&lt;/a&gt; with the passed &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;dialect.defs.IRCClient&lt;/a&gt; and
        &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;dialect.defs.IRCServer&lt;/a&gt; as base context for parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.this.html</link></decl><decl id="64" type="postblit"><name>this(this)</name><desc>&lt;div&gt;&lt;p&gt;Disallow copying of this struct.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.this(this).html</link></decl><decl id="65" type="function"><name>initPostprocessors</name><desc>&lt;div&gt;&lt;p&gt;Initialises defined postprocessors.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.initPostprocessors.html</link></decl><decl id="66" type="variable"><name>clientUpdated</name><desc>&lt;div&gt;&lt;p&gt;Whether or not parsing updated its internal &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;dialect.defs.IRCClient&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.clientUpdated.html</link></decl><decl id="67" type="variable"><name>serverUpdated</name><desc>&lt;div&gt;&lt;p&gt;Whether or not parsing updated its internal &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;dialect.defs.IRCServer&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.serverUpdated.html</link></decl></decl></decl><decl id="68" type="module"><name>dialect.postprocessors</name><desc>&lt;div&gt;&lt;p&gt;Postprocessor package module. Only enumerates the postprocessors into an
    &lt;a class=&quot;xref&quot; href=&quot;std.meta.AliasSeq.html&quot;&gt;std.meta.AliasSeq&lt;/a&gt; for easy foreaching.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.html</link><decl id="69" type="alias"><name>Postprocessors</name><desc>&lt;div&gt;&lt;p&gt;A list of all postprocessor modules, by string name so they can be resolved
    even in &lt;tt class=&quot;inline-code&quot;&gt;singleFile&lt;/tt&gt; mode. These will be instantiated in the order listed.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.Postprocessors.html</link></decl><decl id="70" type="module"><name>dialect.postprocessors.twitch</name><desc>&lt;div&gt;&lt;p&gt;The Twitch postprocessor processes &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;s after
    they are parsed, and deals with Twitch-specifics. Those include extracting
    the colour someone's name should be printed in, their alias/&amp;quot;display name&amp;quot;
    (generally their nickname cased), converting the event to some event types
    unique to Twitch, etc.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.html</link><decl id="71" type="function"><name>parseTwitchTags</name><desc>&lt;div&gt;&lt;p&gt;Parses a Twitch event's IRCv3 tags.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.parseTwitchTags.html</link></decl><decl id="72" type="class"><name>TwitchPostprocessor</name><desc>&lt;div&gt;&lt;p&gt;Twitch-specific postprocessor.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.TwitchPostprocessor.html</link><decl id="73" type="function"><name>postprocess</name><desc>&lt;div&gt;&lt;p&gt;Handle Twitch specifics, modifying the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt; to add
        things like &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html#colour&quot;&gt;dialect.defs.IRCEvent.colour&lt;/a&gt; and differentiate between
        temporary and permanent bans.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.TwitchPostprocessor.postprocess.html</link></decl></decl></decl></decl><decl id="74" type="module"><name>dialect.defs</name><desc>&lt;div&gt;&lt;p&gt;Definitions of struct aggregates used throughout the library, representing
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s and thereto related objects like &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;IRCServer&lt;/a&gt; and &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;IRCUser&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.html</link><decl id="75" type="struct"><name>IRCEvent</name><desc>&lt;div&gt;&lt;p&gt;A single IRC event, parsed from server input.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.html</link><decl id="76" type="enum"><name>Type</name><desc>&lt;div&gt;&lt;p&gt;&lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html&quot;&gt;Type&lt;/a&gt;s of &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.Type.html</link></decl><decl id="77" type="variable"><name>type</name><desc>&lt;div&gt;&lt;p&gt;The event type, signifying what *kind* of event this is.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.type.html</link></decl><decl id="78" type="variable"><name>raw</name><desc>&lt;div&gt;&lt;p&gt;The raw IRC string, untouched.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.raw.html</link></decl><decl id="79" type="variable"><name>sender</name><desc>&lt;div&gt;&lt;p&gt;The name of whoever (or whatever) sent this event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.sender.html</link></decl><decl id="80" type="variable"><name>channel</name><desc>&lt;div&gt;&lt;p&gt;The channel the event transpired in, or is otherwise related to.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.channel.html</link></decl><decl id="81" type="variable"><name>target</name><desc>&lt;div&gt;&lt;p&gt;The target user of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.target.html</link></decl><decl id="82" type="variable"><name>content</name><desc>&lt;div&gt;&lt;p&gt;The main body of text of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.content.html</link></decl><decl id="83" type="variable"><name>aux</name><desc>&lt;div&gt;&lt;p&gt;The auxiliary storage, containing type-specific extra bits of information.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.aux.html</link></decl><decl id="84" type="variable"><name>tags</name><desc>&lt;div&gt;&lt;p&gt;IRCv3 message tags attached to this event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.tags.html</link></decl><decl id="85" type="variable"><name>num</name><desc>&lt;div&gt;&lt;p&gt;With a numeric event, the number of the event type.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.num.html</link></decl><decl id="86" type="variable"><name>count</name><desc>&lt;div&gt;&lt;p&gt;A count, an amount or &amp;quot;times&amp;quot; modifier, where such are applicable.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.count.html</link></decl><decl id="87" type="variable"><name>altcount</name><desc>&lt;div&gt;&lt;p&gt;A secondary count, for where &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.count.html&quot;&gt;count&lt;/a&gt; by itself is insufficient.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.altcount.html</link></decl><decl id="88" type="variable"><name>time</name><desc>&lt;div&gt;&lt;p&gt;A timestamp of when the event transpired.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.time.html</link></decl><decl id="89" type="variable"><name>errors</name><desc>&lt;div&gt;&lt;p&gt;What errors occurred during parsing, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.errors.html</link></decl><decl id="90" type="variable"><name>emotes</name><desc>&lt;div&gt;&lt;p&gt;The Twitch emotes in the message, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.emotes.html</link></decl><decl id="91" type="variable"><name>id</name><desc>&lt;div&gt;&lt;p&gt;The Twitch ID of this message.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.id.html</link></decl></decl><decl id="92" type="struct"><name>IRCServer</name><desc>&lt;div&gt;&lt;p&gt;Aggregate of all information and state pertaining to the connected IRC
    server. Some fields are transient on a per-connection basis and should not
    be serialised.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.html</link><decl id="93" type="enum"><name>Daemon</name><desc>&lt;div&gt;&lt;p&gt;Server daemons, or families of server programs.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.Daemon.html</link></decl><decl id="94" type="enum"><name>CaseMapping</name><desc>&lt;div&gt;&lt;p&gt;Case mappings used by an IRC server.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.CaseMapping.html</link></decl><decl id="95" type="variable"><name>address</name><desc>&lt;div&gt;&lt;p&gt;Server address (or IP).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.address.html</link></decl><decl id="96" type="variable"><name>port</name><desc>&lt;div&gt;&lt;p&gt;The port to connect to, usually &lt;tt class=&quot;inline-code&quot;&gt;6667&lt;/tt&gt;-&lt;tt class=&quot;inline-code&quot;&gt;6669&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.port.html</link></decl><decl id="97" type="variable"><name>daemon</name><desc>&lt;div&gt;&lt;p&gt;The server daemon family the server is running.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.daemon.html</link></decl><decl id="98" type="variable"><name>network</name><desc>&lt;div&gt;&lt;p&gt;Server network string, like Freenode, QuakeNet, Rizon.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.network.html</link></decl><decl id="99" type="variable"><name>daemonstring</name><desc>&lt;div&gt;&lt;p&gt;The reported daemon, with version.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.daemonstring.html</link></decl><decl id="100" type="variable"><name>resolvedAddress</name><desc>&lt;div&gt;&lt;p&gt;The IRC server address handed to us by the round robin pool.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.resolvedAddress.html</link></decl><decl id="101" type="variable"><name>maxNickLength</name><desc>&lt;div&gt;&lt;p&gt;Max nickname length as per IRC specs, but not the de facto standard.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.maxNickLength.html</link></decl><decl id="102" type="variable"><name>maxChannelLength</name><desc>&lt;div&gt;&lt;p&gt;Max channel name length as per IRC specs, or as reported.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.maxChannelLength.html</link></decl><decl id="103" type="variable"><name>aModes</name><desc>&lt;div&gt;&lt;p&gt;A = Mode that adds or removes a nick or address to a list.
                Always has a parameter.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.aModes.html</link></decl><decl id="104" type="variable"><name>bModes</name><desc>&lt;div&gt;&lt;p&gt;B = Mode that changes a setting and always has a parameter.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.bModes.html</link></decl><decl id="105" type="variable"><name>cModes</name><desc>&lt;div&gt;&lt;p&gt;C = Mode that changes a setting and only has a parameter when set.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.cModes.html</link></decl><decl id="106" type="variable"><name>dModes</name><desc>&lt;div&gt;&lt;p&gt;D = Mode that changes a setting and never has a parameter.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.dModes.html</link></decl><decl id="107" type="variable"><name>prefixchars</name><desc>&lt;div&gt;&lt;p&gt;Prefix characters by mode character; &lt;tt class=&quot;inline-code&quot;&gt;o&lt;/tt&gt; by &lt;tt class=&quot;inline-code&quot;&gt;@&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;v&lt;/tt&gt; by &lt;tt class=&quot;inline-code&quot;&gt;+&lt;/tt&gt;, etc.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.prefixchars.html</link></decl><decl id="108" type="variable"><name>prefixes</name><desc>&lt;div&gt;&lt;p&gt;Character channel mode prefixes (&lt;tt class=&quot;inline-code&quot;&gt;o&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;v&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;h&lt;/tt&gt;, ...)&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.prefixes.html</link></decl><decl id="109" type="variable"><name>chantypes</name><desc>&lt;div&gt;&lt;p&gt;Supported channel prefix characters, as announced by the server in
            the &lt;tt class=&quot;inline-code&quot;&gt;ISUPPORT&lt;/tt&gt; event, before the MOTD.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.chantypes.html</link></decl><decl id="110" type="variable"><name>caseMapping</name><desc>&lt;div&gt;&lt;p&gt;The current case mapping, dictating how case-insensitivity works.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.caseMapping.html</link></decl><decl id="111" type="variable"><name>extbanPrefix</name><desc>&lt;div&gt;&lt;p&gt;&lt;tt class=&quot;inline-code&quot;&gt;EXTBAN&lt;/tt&gt; prefix character.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.extbanPrefix.html</link></decl><decl id="112" type="variable"><name>extbanTypes</name><desc>&lt;div&gt;&lt;p&gt;&lt;tt class=&quot;inline-code&quot;&gt;EXTBAN&lt;/tt&gt; types.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.extbanTypes.html</link></decl><decl id="113" type="variable"><name>exceptsChar</name><desc>&lt;div&gt;&lt;p&gt;The modechar for mode exceptions.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.exceptsChar.html</link></decl><decl id="114" type="variable"><name>invexChar</name><desc>&lt;div&gt;&lt;p&gt;The modechar for invite exceptions.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.invexChar.html</link></decl><decl id="115" type="variable"><name>supports</name><desc>&lt;div&gt;&lt;p&gt;Contents of the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#RPL_ISUPPORT&quot;&gt;IRCEvent.Type.RPL_ISUPPORT&lt;/a&gt; response(s).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.supports.html</link></decl></decl><decl id="116" type="struct"><name>IRCUser</name><desc>&lt;div&gt;&lt;p&gt;An aggregate of fields representing a single user on IRC.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.html</link><decl id="117" type="enum"><name>Class</name><desc>&lt;div&gt;&lt;p&gt;Classifiers; roles which a user is one of.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.Class.html</link></decl><decl id="118" type="variable"><name>nickname</name><desc>&lt;div&gt;&lt;p&gt;The user's nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.nickname.html</link></decl><decl id="119" type="variable"><name>realName</name><desc>&lt;div&gt;&lt;p&gt;The user's GECOS/&amp;quot;real name&amp;quot;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.realName.html</link></decl><decl id="120" type="variable"><name>ident</name><desc>&lt;div&gt;&lt;p&gt;The user's IDENT identification.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.ident.html</link></decl><decl id="121" type="variable"><name>address</name><desc>&lt;div&gt;&lt;p&gt;The reported user address, which may be a cloak.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.address.html</link></decl><decl id="122" type="variable"><name>account</name><desc>&lt;div&gt;&lt;p&gt;Services account name (to &lt;tt class=&quot;inline-code&quot;&gt;NickServ&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;AuthServ&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;Q&lt;/tt&gt;, etc).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.account.html</link></decl><decl id="123" type="variable"><name>updated</name><desc>&lt;div&gt;&lt;p&gt;Timestamp when the user was last modified.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.updated.html</link></decl><decl id="124" type="variable"><name>class_</name><desc>&lt;div&gt;&lt;p&gt;User classifier.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.class_.html</link></decl><decl id="125" type="variable"><name>displayName</name><desc>&lt;div&gt;&lt;p&gt;The alternate &amp;quot;display name&amp;quot; of the user.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.displayName.html</link></decl><decl id="126" type="variable"><name>badges</name><desc>&lt;div&gt;&lt;p&gt;The Twitch badges this user has.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.badges.html</link></decl><decl id="127" type="variable"><name>colo alect.defs.IRCChannel.users.html</link></decl><decl id="174" type="variable"><name>mods</name><desc>&lt;div&gt;&lt;p&gt;Associative array of nicknames with a prefixing channel mode (operator,
        halfops, voiced, ...) keyed by modechar.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.mods.html</link></decl><decl id="175" type="function"><name>modsShorthand</name><desc>&lt;div&gt;&lt;p&gt;Template to deduplicate code for mods shorthands.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.modsShorthand.html</link></decl><decl id="176" type="alias"><name>ops</name><desc>&lt;div&gt;&lt;p&gt;Array of channel operators.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.ops.html</link></decl><decl id="177" type="alias"><name>halfops</name><desc>&lt;div&gt;&lt;p&gt;Array of channel halfops.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.halfops.html</link></decl><decl id="178" type="alias"><name>voiced</name><desc>&lt;div&gt;&lt;p&gt;Array of voiced channel users.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.voiced.html</link></decl><decl id="179" type="variable"><name>created</name><desc>&lt;div&gt;&lt;p&gt;When the channel was created, expressed in UNIX time.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.created.html</link></decl></decl><decl id="180" type="struct"><name>IRCClient</name><desc>&lt;div&gt;&lt;p&gt;Aggregate collecting all the relevant settings, options and state needed for
    a connection to an IRC server.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.html</link><decl id="181" type="variable"><name>nickname</name><desc>&lt;div&gt;&lt;p&gt;Client nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.nickname.html</link></decl><decl id="182" type="variable"><name>user</name><desc>&lt;div&gt;&lt;p&gt;Client &amp;quot;user&amp;quot;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.user.html</link></decl><decl id="183" type="variable"><name>realName</name><desc>&lt;div&gt;&lt;p&gt;Client GECOS/&amp;quot;real name&amp;quot;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.realName.html</link></decl><decl id="184" type="variable"><name>origNickname</name><desc>&lt;div&gt;&lt;p&gt;The original client nickname before connecting, in case it changed.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.origNickname.html</link></decl><decl id="185" type="variable"><name>ident</name><desc>&lt;div&gt;&lt;p&gt;Client IDENT identifier. Defaults to &amp;quot;~&lt;tt class=&quot;inline-code&quot;&gt;user&lt;/tt&gt;&amp;quot;. Unused but keep for future expansion.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.ident.html</link></decl><decl id="186" type="variable"><name>displayName</name><desc>&lt;div&gt;&lt;p&gt;Our Twitch display name or alias.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.displayName.html</link></decl><decl id="187" type="variable"><name>modes</name><desc>&lt;div&gt;&lt;p&gt;The current modechars active on the client (e.g. &amp;quot;ix&amp;quot;);&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.modes.html</link></decl></decl></decl><decl id="188" type="module"><name>dialect.assertgen</name><desc>&lt;div&gt;&lt;p&gt;Interactive assert statement generation from raw IRC strings, for use in the
    source code &lt;tt class=&quot;inline-code&quot;&gt;unittest&lt;/tt&gt; blocks.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.html</link><decl id="189" type="function"><name>formatClientAssignment</name><desc>&lt;div&gt;&lt;p&gt;Constructs statement lines for each changed field of an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;dialect.defs.IRCClient&lt;/a&gt;, including instantiating a fresh one.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.formatClientAssignment.html</link></decl><decl id="190" type="function"><name>formatEventAssertBlock</name><desc>&lt;div&gt;&lt;p&gt;Constructs assert statement blocks for each changed field of an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.formatEventAssertBlock.html</link></decl></decl><decl id="191" type="module"><name>dialect.common</name><desc>&lt;div&gt;&lt;p&gt;Helper functions needed to parse raw IRC event strings into &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;s.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.html</link><decl id="192" type="function"><name>typenumsOf</name><desc>&lt;div&gt;&lt;p&gt;Returns the &lt;tt class=&quot;inline-code&quot;&gt;typenums&lt;/tt&gt; mapping for a given &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.Daemon.html&quot;&gt;dialect.defs.IRCServer.Daemon&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.typenumsOf.html</link></decl><decl id="193" type="function"><name>decodeIRCv3String</name><desc>&lt;div&gt;&lt;p&gt;Decodes an IRCv3 tag string, replacing some characters.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.decodeIRCv3String.html</link></decl><decl id="194" type="function"><name>isAuthService</name><desc>&lt;div&gt;&lt;p&gt;Inspects an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;dialect.defs.IRCUser&lt;/a&gt; and judges whether or not it is
    authentication services.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isAuthService.html</link></decl><decl id="195" type="function"><name>isValidChannel</name><desc>&lt;div&gt;&lt;p&gt;Examines a string and judges whether or not it *looks* like a channel.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidChannel.html</link></decl><decl id="196" type="function"><name>isValidNickname</name><desc>&lt;div&gt;&lt;p&gt;Examines a string and judges whether or not it *looks* like a nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidNickname.html</link></decl><decl id="197" type="function"><name>isValidNicknameCharacter</name><desc>&lt;div&gt;&lt;p&gt;Returns whether or not a passed &lt;tt class=&quot;inline-code&quot;&gt;char&lt;/tt&gt; can be part of a nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidNicknameCharacter.html</link></decl><decl id="198" type="function"><name>stripModesign</name><desc>&lt;div&gt;&lt;p&gt;Takes a nickname and strips it of any prepended mode signs, like the &lt;tt class=&quot;inline-code&quot;&gt;@&lt;/tt&gt; in
    &lt;tt class=&quot;inline-code&quot;&gt;@nickname&lt;/tt&gt;. Saves the stripped signs in the ref string &lt;tt class=&quot;inline-code&quot;&gt;modesigns&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.stripModesign.1.html</link></decl><decl id="199" type="function"><name>stripModesign</name><desc>&lt;div&gt;&lt;p&gt;Convenience function to &lt;a class=&quot;xref&quot; href=&quot;dialect.common.stripModesign.2.html&quot;&gt;stripModesign&lt;/a&gt; that doesn't take an out string
    parameter to store the stripped modesign characters in.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.stripModesign.2.html</link></decl><decl id="200" type="function"><name>setMode</name><desc>&lt;div&gt;&lt;p&gt;Sets a new or removes a &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;dialect.defs.IRCChannel.Mode&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.setMode.html</link></decl><decl id="201" type="class"><name>IRCParseException</name><desc>&lt;div&gt;&lt;p&gt;IRC Parsing Exception, thrown when there were errors parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.html</link><decl id="202" type="variable"><name>event</name><desc>&lt;div&gt;&lt;p&gt;Bundled &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;, parsing which threw this exception.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.event.html</link></decl><decl id="203" type="constructor"><name>this</name><desc>&lt;div&gt;&lt;p&gt;Create a new &lt;a class=&quot;xref&quot; href=&quot;dialect.common.IRCParseException.html&quot;&gt;IRCParseException&lt;/a&gt;, without attaching an
        &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.this.1.html</link></decl><decl id="204" type="constructor"><name>this</name><desc>&lt;div&gt;&lt;p&gt;Create a new &lt;a class=&quot;xref&quot; href=&quot;dialect.common.IRCParseException.html&quot;&gt;IRCParseException&lt;/a&gt;, attaching an
        &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt; to it.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.this.2.html</link></decl></decl><decl id="205" type="enum"><name>IRCControlCharacter</name><desc>&lt;div&gt;&lt;p&gt;Certain characters that signal specific meaning in an IRC context.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCControlCharacter.html</link></decl><decl id="206" type="function"><name>matchesByMask</name><desc>&lt;div&gt;&lt;p&gt;Compares this &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;dialect.defs.IRCUser&lt;/a&gt; with a second one, treating fields with
    asterisks as glob wildcards, mimicking &lt;tt class=&quot;inline-code&quot;&gt;*!*@*&lt;/tt&gt; mask matching.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.matchesByMask.html</link></decl><decl id="207" type="function"><name>isUpper</name><desc>&lt;div&gt;&lt;p&gt;Checks whether the passed &lt;tt class=&quot;inline-code&quot;&gt;char&lt;/tt&gt; is in uppercase as per the supplied case mappings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isUpper.html</link></decl><decl id="208" type="function"><name>toLower</name><desc>&lt;div&gt;&lt;p&gt;Produces the passed &lt;tt class=&quot;inline-code&quot;&gt;char&lt;/tt&gt; in lowercase as per the supplied case mappings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.toLower.html</link></decl><decl id="209" type="function"><name>toLowerCase</name><desc>&lt;div&gt;&lt;p&gt;Produces the passed string in lowercase as per the supplied case mappings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.toLowerCase.html</link></decl><decl id="210" type="function"><name>opEqualsCaseInsensitive</name><desc>&lt;div&gt;&lt;p&gt;Compares two strings to see if they match if case is ignored.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.opEqualsCaseInsensitive.html</link></decl><decl id="211" type="function"><name>isValidHostmask</name><desc>&lt;div&gt;&lt;p&gt;Makes a cursory verification of a hostmask, ensuring that it doesn't contain
    invalid characters. May very well have false positives.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidHostmask.html</link></decl><decl id="212" type="interface"><name>Postprocessor</name><desc>&lt;div&gt;&lt;p&gt;Postprocessor interface for concrete postprocessors to inherit from.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.Postprocessor.html</link><decl id="213" type="function"><name>postprocess</name><desc>&lt;div&gt;&lt;p&gt;Postprocesses an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;dialect.defs.IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.Postprocessor.postprocess.html</link></decl></decl></decl></decl><decl id="214" type="module"><name>dialect.defs</name><desc>&lt;div&gt;&lt;p&gt;Definitions of struct aggregates used throughout the library, representing
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s and thereto related objects like &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;IRCServer&lt;/a&gt; and &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;IRCUser&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.html</link><decl id="215" type="struct"><name>IRCEvent</name><desc>&lt;div&gt;&lt;p&gt;A single IRC event, parsed from server input.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.html</link><decl id="216" type="enum"><name>Type</name><desc>&lt;div&gt;&lt;p&gt;&lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html&quot;&gt;Type&lt;/a&gt;s of &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.Type.html</link></decl><decl id="217" type="variable"><name>type</name><desc>&lt;div&gt;&lt;p&gt;The event type, signifying what *kind* of event this is.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.type.html</link></decl><decl id="218" type="variable"><name>raw</name><desc>&lt;div&gt;&lt;p&gt;The raw IRC string, untouched.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.raw.html</link></decl><decl id="219" type="variable"><name>sender</name><desc>&lt;div&gt;&lt;p&gt;The name of whoever (or whatever) sent this event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.sender.html</link></decl><decl id="220" type="variable"><name>channel</name><desc>&lt;div&gt;&lt;p&gt;The channel the event transpired in, or is otherwise related to.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.channel.html</link></decl><decl id="221" type="variable"><name>target</name><desc>&lt;div&gt;&lt;p&gt;The target user of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.target.html</link></decl><decl id="222" type="variable"><name>content</name><desc>&lt;div&gt;&lt;p&gt;The main body of text of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.content.html</link></decl><decl id="223" type="variable"><name>aux</name><desc>&lt;div&gt;&lt;p&gt;The auxiliary storage, containing type-specific extra bits of information.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.aux.html</link></decl><decl id="224" type="variable"><name>tags</name><desc>&lt;div&gt;&lt;p&gt;IRCv3 message tags attached to this event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.tags.html</link></decl><decl id="225" type="variable"><name>num</name><desc>&lt;div&gt;&lt;p&gt;With a numeric event, the number of the event type.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.num.html</link></decl><decl id="226" type="variable"><name>count</name><desc>&lt;div&gt;&lt;p&gt;A count, an amount or &amp;quot;times&amp;quot; modifier, where such are applicable.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.count.html</link></decl><decl id="227" type="variable"><name>altcount</name><desc>&lt;div&gt;&lt;p&gt;A secondary count, for where &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.count.html&quot;&gt;count&lt;/a&gt; by itself is insufficient.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.altcount.html</link></decl><decl id="228" type="variable"><name>time</name><desc>&lt;div&gt;&lt;p&gt;A timestamp of when the event transpired.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.time.html</link></decl><decl id="229" type="variable"><name>errors</name><desc>&lt;div&gt;&lt;p&gt;What errors occurred during parsing, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.errors.html</link></decl><decl id="230" type="variable"><name>emotes</name><desc>&lt;div&gt;&lt;p&gt;The Twitch emotes in the message, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.emotes.html</link></decl><decl id="231" type="variable"><name>id</name><desc>&lt;div&gt;&lt;p&gt;The Twitch ID of this message.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.id.html</link></decl></decl><decl id="232" type="struct"><name>IRCServer</name><desc>&lt;div&gt;&lt;p&gt;Aggregate of all information and state pertaining to the connected IRC
    server. Some fields are transient on a per-connection basis and should not
    be serialised.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.html</link><decl id="233" type="enum"><name>Daemon</name><desc>&lt;div&gt;&lt;p&gt;Server daemons, or families of server programs.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.Daemon.html</link></decl><decl id="234" type="enum"><name>CaseMapping</name><desc>&lt;div&gt;&lt;p&gt;Case mappings used by an IRC server.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.CaseMapping.html</link></decl><decl id="235" type="variable"><name>address</name><desc>&lt;div&gt;&lt;p&gt;Server address (or IP).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.address.html</link></decl><decl id="236" type="variable"><name>port</name><desc>&lt;div&gt;&lt;p&gt;The port to connect to, usually &lt;tt class=&quot;inline-code&quot;&gt;6667&lt;/tt&gt;-&lt;tt class=&quot;inline-code&quot;&gt;6669&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.port.html</link></decl><decl id="237" type="variable"><name>daemon</name><desc>&lt;div&gt;&lt;p&gt;The server daemon family the server is running.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.daemon.html</link></decl><decl id="238" type="variable"><name>network</name><desc>&lt;div&gt;&lt;p&gt;Server network string, like Freenode, QuakeNet, Rizon.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.network.html</link></decl><decl id="239" type="variable"><name>daemonstring</name><desc>&lt;div&gt;&lt;p&gt;The reported daemon, with version.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.daemonstring.html</link></decl><decl id="240" type="variable"><name>resolvedAddress</name><desc>&lt;div&gt;&lt;p&gt;The IRC server address handed to us by the round robin pool.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.resolvedAddress.html</link></decl><decl id="241" type="variable"><name>maxNickLength</name><desc>&lt;div&gt;&lt;p&gt;Max nickname length as per IRC specs, but not the de facto standard.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.maxNickLength.html</link></decl><decl id="242" type="variable"><name>maxChannelLength</name><desc>&lt;div&gt;&lt;p&gt;Max channel name length as per IRC specs, or as reported.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.maxChannelLength.html</link></decl><decl id="243" type="variable"><name>aModes</name><desc>&lt;div&gt;&lt;p&gt;A = Mode that adds or removes a nick or address to a list.
                Always has a parameter.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.aModes.html</link></decl><decl id="244" type="variable"><name>bModes</name><desc>&lt;div&gt;&lt;p&gt;B = Mode that changes a setting and always has a parameter.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.bModes.html</link></decl><decl id="245" type="variable"><name>cModes</name><desc>&lt;div&gt;&lt;p&gt;C = Mode that changes a setting and only has a parameter when set.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.cModes.html</link></decl><decl id="246" type="variable"><name>dModes</name><desc>&lt;div&gt;&lt;p&gt;D = Mode that changes a setting and never has a parameter.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.dModes.html</link></decl><decl id="247" type="variable"><name>prefixchars</name><desc>&lt;div&gt;&lt;p&gt;Prefix characters by mode character; &lt;tt class=&quot;inline-code&quot;&gt;o&lt;/tt&gt; by &lt;tt class=&quot;inline-code&quot;&gt;@&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;v&lt;/tt&gt; by &lt;tt class=&quot;inline-code&quot;&gt;+&lt;/tt&gt;, etc.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.prefixchars.html</link></decl><decl id="248" type="variable"><name>prefixes</name><desc>&lt;div&gt;&lt;p&gt;Character channel mode prefixes (&lt;tt class=&quot;inline-code&quot;&gt;o&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;v&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;h&lt;/tt&gt;, ...)&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.prefixes.html</link></decl><decl id="249" type="variable"><name>chantypes</name><desc>&lt;div&gt;&lt;p&gt;Supported channel prefix characters, as announced by the server in
            the &lt;tt class=&quot;inline-code&quot;&gt;ISUPPORT&lt;/tt&gt; event, before the MOTD.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.chantypes.html</link></decl><decl id="250" type="variable"><name>caseMapping</name><desc>&lt;div&gt;&lt;p&gt;The current case mapping, dictating how case-insensitivity works.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.caseMapping.html</link></decl><decl id="251" type="variable"><name>extbanPrefix</name><desc>&lt;div&gt;&lt;p&gt;&lt;tt class=&quot;inline-code&quot;&gt;EXTBAN&lt;/tt&gt; prefix character.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.extbanPrefix.html</link></decl><decl id="252" type="variable"><name>extbanTypes</name><desc>&lt;div&gt;&lt;p&gt;&lt;tt class=&quot;inline-code&quot;&gt;EXTBAN&lt;/tt&gt; types.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.extbanTypes.html</link></decl><decl id="253" type="variable"><name>exceptsChar</name><desc>&lt;div&gt;&lt;p&gt;The modechar for mode exceptions.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.exceptsChar.html</link></decl><decl id="254" type="variable"><name>invexChar</name><desc>&lt;div&gt;&lt;p&gt;The modechar for invite exceptions.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.invexChar.html</link></decl><decl id="255" type="variable"><name>supports</name><desc>&lt;div&gt;&lt;p&gt;Contents of the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#RPL_ISUPPORT&quot;&gt;IRCEvent.Type.RPL_ISUPPORT&lt;/a&gt; response(s).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.supports.html</link></decl></decl><decl id="256" type="struct"><name>IRCUser</name><desc>&lt;div&gt;&lt;p&gt;An aggregate of fields representing a single user on IRC.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.html</link><decl id="257" type="enum"><name>Class</name><desc>&lt;div&gt;&lt;p&gt;Classifiers; roles which a user is one of.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCUser.Cla
